version: 2

models:
  - name: stg_shopify_orders
    description: "staging test for shopify orders"
    columns:
      - name: order_id
        description: "unique order identifier"
        tests:
          - not_null

      - name: financial_status
        tests:
          - not_null
          - accepted_values:
              values: ["paid", "refunded", "partially_refunded"]
